  - title: Product Manager & Programme Manager
    company: British Army — Combat CIS School
    location: Bovington, Dorset, UK
    period: Jul 2020 – Sep 2023
    highlights:
      - Delivered end-to-end product lifecycle management for a multi-organisation capability programme across 5 entities, defining product vision, building the roadmap, and overseeing iterative development from concept through to fielding.
      - Saved 960 instructor hours per year (24 full working weeks) by redesigning training delivery processes and introducing digital tooling, directly improving organisational capacity and throughput.
      - Increased student output by 30% through data-driven curriculum redesign, applying analytics and structured feedback loops to identify bottlenecks and optimise outcomes.
      - Led a cross-functional team of 12 and a wider community of 32 senior NCOs, running weekly stand-ups, sprint reviews and retrospectives aligned to agile principles in a regulated, security-sensitive environment.
      - Produced business cases, roadmaps and risk registers to secure Director-level investment approval; managed programme budget and resource allocation throughout delivery.

  - title: SO3 Operations and Deployments (Op SHADER 9)
    company: British Army (operational deployment from RSO role)
    location: Taji, Iraq
    period: 6-month operational deployment, 2019
    highlights:
      - Coordinated movement, deployment and handover of approximately 600 UK personnel across all active Middle Eastern theatres, countries, bases and coalition embeddings.
      - Inherited fragmented personnel tracking spread across multiple security classifications and coalition nations; built a unified single source of truth using the secure tools available, codifying data structures and reconciling competing versions from UK strategic headquarters, deployed UK HQs, formed unit HQs, owning units and coalition partners.
      - Created operational intelligence tools to visualise deployment risk, surfacing compounding overlap risk that had previously been invisible in disconnected data sources.
      - Briefed the UK brigadier daily and the coalition general weekly on the full deployment picture; convinced UK strategic headquarters to adopt the ground-level single source of truth.
      - System and processes established were adopted as the standard for subsequent operational deployments.

  - title: Regimental Signals Officer (Technical Coordinator)
    company: British Army — 1st Bn Duke of Lancaster's Regiment
    location: Chester, UK
    period: Jul 2018 – Jul 2020
    highlights:
      - Coordinated secure communications infrastructure across a regiment of 500+ personnel, ensuring connectivity during exercises and international deployments including Kenya.
      - Translated deeply technical communications planning (RF propagation, power settings, electromagnetic penetration values) into accessible, actionable outputs for non-technical commanders using plain language, map overlays and conceptual diagrams.
      - Increased trained communication specialists from 2 to 8 per 30-person team, significantly enhancing unit operational capability and readiness.
      - Maintained 100% compliance with cryptographic material security protocols, achieving an incident-free reporting period across both years of responsibility.

