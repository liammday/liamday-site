<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}" />
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="48x48" />
<link rel="icon" href="{{ '/assets/images/favicons/favicon-32x32.png' | relative_url }}" type="image/png" sizes="32x32" />
<link rel="icon" href="{{ '/assets/images/favicons/favicon-16x16.png' | relative_url }}" type="image/png" sizes="16x16" />
<link rel="apple-touch-icon" href="{{ '/assets/images/favicons/apple-touch-icon.png' | relative_url }}" />
<link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}" />
<meta name="theme-color" content="#1a1d21" />
<meta name="msapplication-TileImage" content="{{ '/assets/images/favicons/mstile-270x270.png' | relative_url }}" />
<meta name="msapplication-TileColor" content="#1a1d21" />
<script>
  (function(){var d=document.documentElement;try{var c=document.cookie.match(/(?:^|;\s*)theme=(\w+)/);if(c){d.setAttribute('data-theme',c[1])}else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches){d.setAttribute('data-theme','light')}}catch(e){}})();
</script>
{% assign css_version = site.github.build_revision %}
{% unless css_version %}
  {% assign css_version = site.time | date: '%s' %}
{% endunless %}
<link rel="stylesheet" href="{{ '/assets/css/tailwind.css' | relative_url }}?v={{ css_version }}" />
{% seo %}
{% assign og_img = '/assets/images/favicons/og-image.jpg' | absolute_url %}
<meta property="og:image" content="{{ og_img }}" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:type" content="image/jpeg" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="{{ og_img }}" />
