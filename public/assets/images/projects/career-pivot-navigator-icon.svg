<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="cpn-icon-title">
  <title id="cpn-icon-title">Career Pivot Navigator app icon</title>
  <defs>
    <radialGradient id="cpn-icon-bg" cx="38%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#33251f"/>
      <stop offset="65%" stop-color="#221a16"/>
      <stop offset="100%" stop-color="#181210"/>
    </radialGradient>
    <radialGradient id="cpn-icon-hub" cx="40%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#eda988"/>
      <stop offset="55%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#a85c44"/>
    </radialGradient>
    <linearGradient id="cpn-icon-route" x1="84" y1="172" x2="186" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#cc785c" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f0b48c" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#f0b48c" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#cpn-icon-bg)"/>

  <!-- Bearing ring -->
  <g fill="none" stroke="#cc785c" stroke-opacity="0.18">
    <circle cx="84" cy="172" r="30"/>
    <circle cx="84" cy="172" r="48"/>
  </g>

  <!-- Soft routes -->
  <g fill="none" stroke="#cc785c" stroke-opacity="0.4" stroke-width="2.5" stroke-dasharray="2 8" stroke-linecap="round">
    <path d="M84 172 C 150 150, 120 90, 132 64"/>
    <path d="M84 172 C 160 170, 180 150, 188 138"/>
  </g>

  <!-- Lit route to the recommended destination -->
  <path d="M84 172 C 150 140, 168 100, 184 80" fill="none" stroke="url(#cpn-icon-route)" stroke-width="4" stroke-linecap="round"/>

  <!-- Candidate waypoints -->
  <g fill="#f3ebde" fill-opacity="0.85">
    <circle cx="132" cy="64" r="5.5"/>
    <circle cx="188" cy="138" r="5.5"/>
  </g>

  <!-- Recommended destination: flagged + ringed -->
  <circle cx="184" cy="80" r="7" fill="#f3ebde"/>
  <circle cx="184" cy="80" r="13" fill="none" stroke="#f0b48c" stroke-opacity="0.85" stroke-width="1.5"/>
  <line x1="184" y1="80" x2="184" y2="52" stroke="#f0b48c" stroke-opacity="0.9" stroke-width="2"/>
  <path d="M184 53 L206 58 L184 65 Z" fill="#cc785c"/>

  <!-- Origin hub -->
  <circle cx="84" cy="172" r="17" fill="url(#cpn-icon-hub)"/>
  <ellipse cx="79" cy="167" rx="5.5" ry="2.2" fill="#f6cdb8" opacity="0.5"/>
</svg>
