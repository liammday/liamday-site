<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="cpn-og-title">
  <title id="cpn-og-title">Career Pivot Navigator</title>
  <defs>
    <radialGradient id="cpn-og-bg" cx="26%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#33251f"/>
      <stop offset="60%" stop-color="#231b17"/>
      <stop offset="100%" stop-color="#181210"/>
    </radialGradient>
    <radialGradient id="cpn-og-hub" cx="40%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#eda988"/>
      <stop offset="55%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#a85c44"/>
    </radialGradient>
    <linearGradient id="cpn-og-route" x1="150" y1="430" x2="420" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#cc785c" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#f0b48c" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#f0b48c" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#cpn-og-bg)"/>

  <!-- Wayfinding motif, left -->
  <g fill="none" stroke="#9da1a9" stroke-opacity="0.08" stroke-width="1.5">
    <path d="M-20 250 C 160 200, 360 300, 520 230"/>
    <path d="M-20 380 C 180 330, 380 430, 540 360"/>
  </g>
  <g fill="none" stroke="#cc785c" stroke-opacity="0.18">
    <circle cx="150" cy="430" r="44"/>
    <circle cx="150" cy="430" r="68"/>
  </g>
  <g fill="none" stroke="#cc785c" stroke-opacity="0.4" stroke-width="2.5" stroke-dasharray="2 9" stroke-linecap="round">
    <path d="M150 430 C 280 400, 300 280, 330 250"/>
    <path d="M150 430 C 300 420, 380 380, 430 360"/>
  </g>
  <path d="M150 430 C 280 360, 360 250, 414 196" fill="none" stroke="url(#cpn-og-route)" stroke-width="4" stroke-linecap="round"/>
  <g fill="#f3ebde" fill-opacity="0.85">
    <circle cx="330" cy="250" r="6.5"/>
    <circle cx="430" cy="360" r="6.5"/>
  </g>
  <circle cx="414" cy="196" r="9" fill="#f3ebde"/>
  <circle cx="414" cy="196" r="16" fill="none" stroke="#f0b48c" stroke-opacity="0.85" stroke-width="1.5"/>
  <line x1="414" y1="196" x2="414" y2="156" stroke="#f0b48c" stroke-opacity="0.9" stroke-width="2"/>
  <path d="M414 158 L448 165 L414 174 Z" fill="#cc785c"/>
  <circle cx="150" cy="430" r="26" fill="url(#cpn-og-hub)"/>
  <ellipse cx="142" cy="423" rx="8" ry="3" fill="#f6cdb8" opacity="0.5"/>

  <!-- Text, right -->
  <text x="560" y="250" font-family="'Styrene B','Inter',-apple-system,sans-serif" font-size="30" letter-spacing="3" fill="#83878f" text-transform="uppercase">APPLIED AI · GROUNDED MCP</text>
  <text x="560" y="318" font-family="'Styrene B','Inter',-apple-system,sans-serif" font-size="58" font-weight="700" fill="#e4e7ec">Career Pivot</text>
  <text x="560" y="384" font-family="'Styrene B','Inter',-apple-system,sans-serif" font-size="58" font-weight="700" fill="#e4e7ec">Navigator</text>
  <text x="560" y="438" font-family="'Styrene B','Inter',-apple-system,sans-serif" font-size="24" fill="#9da1a9">Grounded career-transition guidance</text>
  <text x="560" y="470" font-family="'Styrene B','Inter',-apple-system,sans-serif" font-size="24" fill="#9da1a9">for UK service leavers. Every figure cited.</text>
  <rect x="560" y="512" width="120" height="4" rx="2" fill="#cc785c"/>
  <text x="560" y="556" font-family="'Styrene B','Inter',-apple-system,sans-serif" font-size="22" fill="#83878f">liamday.co.uk</text>
</svg>
