<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="up-hero-title up-hero-desc" preserveAspectRatio="xMidYMid slice">
  <title id="up-hero-title">Claude Usage Pacer</title>
  <desc id="up-hero-desc">A glowing dual-ring usage gauge on a warm-dark field, an outer weekly ring and an inner five-hour ring with a target tick, feeding from a ledger of usage lines on the left and fanning to the right into a rising curve that fills the week toward a target, studded with five-hour window markers, one of them lit and ringed.</desc>
