<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LifeOS — case study card</title>
  <desc id="desc">A wide social card for LifeOS, with a prominent wordmark and a simplified architecture mark on the right.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2EDE3"/>
      <stop offset="100%" stop-color="#E8DFCC"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CC785C" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#CC785C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#CC785C" stop-opacity="0"/>
    </radialGradient>
    <style>
      .serif { font-family: "Tiempos Headline", "Iowan Old Style", Georgia, "Times New Roman", serif; }
      .sans { font-family: "Styrene B", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .wordmark { font-size: 144px; font-weight: 500; fill: #2D2A26; letter-spacing: -3px; }
      .tagline { font-size: 26px; font-weight: 400; fill: #6B5F52; }
      .eyebrow { font-size: 13px; font-weight: 500; fill: #8B7E6F; letter-spacing: 4px; text-transform: uppercase; }
      .footer { font-size: 16px; font-weight: 500; fill: #6B5F52; letter-spacing: 1px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Right-side ambient glow behind the constellation -->
  <circle cx="930" cy="315" r="280" fill="url(#orbGlow)"/>

  <!-- ============== Left column: text ============== -->
  <text x="80" y="138" class="sans eyebrow">P1, case study</text>
  <text x="80" y="262" class="serif wordmark">LifeOS</text>
  <line x1="80" y1="292" x2="160" y2="292" stroke="#CC785C" stroke-width="2.5" stroke-linecap="round"/>
  <text x="80" y="346" class="serif tagline" font-style="italic">Eight domains.</text>
  <text x="80" y="378" class="serif tagline" font-style="italic">One spine.</text>
  <text x="80" y="410" class="serif tagline" font-style="italic">One ingestion path.</text>

  <!-- Footer -->
  <text x="80" y="560" class="sans footer">liamday.co.uk</text>
  <line x1="80" y1="575" x2="220" y2="575" stroke="#8B7E6F" stroke-width="1" stroke-opacity="0.4"/>

  <!-- ============== Right column: constellation ============== -->
  <!-- Spine + 8 domains. Smaller, cleaner version of the hero mark. -->
  <g transform="translate(930, 315)">
    <!-- Eight domain dots in a ring -->
    <g fill="#FFFFFF" stroke="#3D3929" stroke-width="1.5">
      <circle cx="0" cy="-150" r="22"/>
      <circle cx="106" cy="-106" r="22"/>
      <circle cx="150" cy="0" r="22"/>
      <circle cx="106" cy="106" r="22"/>
      <circle cx="0" cy="150" r="22"/>
      <circle cx="-106" cy="106" r="22"/>
      <circle cx="-150" cy="0" r="22"/>
      <circle cx="-106" cy="-106" r="22"/>
    </g>

    <!-- Three of the eight rendered dashed (sensitive) -->
    <g fill="#FBF6EC" stroke="#3D3929" stroke-width="1.5" stroke-dasharray="3 3">
      <circle cx="-106" cy="-106" r="22"/>
      <circle cx="106" cy="106" r="22"/>
      <circle cx="-106" cy="106" r="22"/>
    </g>

    <!-- Thin coral spokes -->
    <g stroke="#CC785C" stroke-width="1" stroke-opacity="0.45" fill="none">
      <line x1="0" y1="-42" x2="0" y2="-128"/>
      <line x1="30" y1="-30" x2="84" y2="-84"/>
      <line x1="42" y1="0" x2="128" y2="0"/>
      <line x1="30" y1="30" x2="84" y2="84"/>
      <line x1="0" y1="42" x2="0" y2="128"/>
      <line x1="-30" y1="30" x2="-84" y2="84"/>
      <line x1="-42" y1="0" x2="-128" y2="0"/>
      <line x1="-30" y1="-30" x2="-84" y2="-84"/>
    </g>

    <!-- Central spine -->
    <circle r="42" fill="#FFFFFF" stroke="#CC785C" stroke-width="2.5"/>
    <text class="sans" font-size="13" font-weight="600" fill="#2D2A26" text-anchor="middle" y="0">Spine</text>
  </g>

  <!-- Bottom-right corner tag -->
  <text x="1120" y="600" class="sans" font-size="13" fill="#8B7E6F" letter-spacing="2px" text-anchor="end">v1, 2026</text>
</svg>
