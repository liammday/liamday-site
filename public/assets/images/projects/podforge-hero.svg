<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="pf-hero-title pf-hero-desc" preserveAspectRatio="xMidYMid slice">
  <title id="pf-hero-title">PodForge</title>
  <desc id="pf-hero-desc">A glowing forge core on a warm-dark field renders lines of script into an ember audio waveform, which fans out to the right into concentric broadcast arcs scattered with episode blips — one of them lit and ringed.</desc>

  <defs>
    <radialGradient id="pf-hero-bg" cx="30%" cy="50%" r="78%">
      <stop offset="0%" stop-color="#33251f"/>
      <stop offset="58%" stop-color="#231b17"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </radialGradient>
    <radialGradient id="pf-hero-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc785c" stop-opacity="0.40"/>
      <stop offset="42%" stop-color="#cc785c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#cc785c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pf-hero-core" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#fce3c8"/>
      <stop offset="34%" stop-color="#f3b184"/>
      <stop offset="64%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#9c5236"/>
    </radialGradient>
    <linearGradient id="pf-hero-wave" x1="540" y1="0" x2="980" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f9dcc3"/>
      <stop offset="34%" stop-color="#f0b48c"/>
      <stop offset="100%" stop-color="#cc785c"/>
    </linearGradient>
  </defs>

  <!-- Warm dark field -->
  <rect width="1600" height="800" fill="url(#pf-hero-bg)"/>
  <circle cx="470" cy="400" r="380" fill="url(#pf-hero-glow)"/>

  <!-- Script feeding into the core (transcript lines) -->
  <g fill="#f3ebde" opacity="0.5">
    <rect x="96" y="338" width="150" height="7" rx="3.5"/>
    <rect x="96" y="362" width="196" height="7" rx="3.5"/>
    <rect x="96" y="386" width="168" height="7" rx="3.5"/>
    <rect x="96" y="410" width="208" height="7" rx="3.5"/>
    <rect x="96" y="434" width="142" height="7" rx="3.5"/>
    <rect x="96" y="458" width="184" height="7" rx="3.5"/>
  </g>
  <g stroke="#f0b48c" stroke-opacity="0.35" stroke-width="1.5" fill="none">
    <path d="M312 360 Q380 372 418 392"/>
    <path d="M324 414 Q380 408 418 404"/>
    <path d="M300 452 Q380 440 418 418"/>
  </g>

  <!-- Broadcast arcs fanning out to the right -->
  <g fill="none" stroke="#cc785c">
    <path d="M1054.3 282.4 A150 150 0 0 1 1054.3 517.6" stroke-opacity="0.42" stroke-width="2"/>
    <path d="M1087.0 246.7 A240 240 0 0 1 1087.0 553.3" stroke-opacity="0.30" stroke-width="2"/>
    <path d="M1119.4 211.0 A330 330 0 0 1 1119.4 589.0" stroke-opacity="0.20" stroke-width="2"/>
    <path d="M1151.8 175.3 A420 420 0 0 1 1151.8 624.7" stroke-opacity="0.13" stroke-width="2"/>
  </g>
  <path d="M1184.2 139.6 A510 510 0 0 1 1184.2 660.4" fill="none" stroke="#9da1a9" stroke-opacity="0.10" stroke-width="1.5"/>

  <!-- Ember audio waveform: molten at the core, cooling as it broadcasts -->
  <g stroke="url(#pf-hero-wave)" stroke-width="7" stroke-linecap="round">
    <line x1="548" y1="382" x2="548" y2="418"/>
    <line x1="561" y1="371" x2="561" y2="429"/>
    <line x1="574" y1="354" x2="574" y2="446"/>
    <line x1="587" y1="340" x2="587" y2="460"/>
    <line x1="600" y1="325" x2="600" y2="475"/>
    <line x1="613" y1="338" x2="613" y2="462"/>
    <line x1="626" y1="357" x2="626" y2="443"/>
    <line x1="639" y1="374" x2="639" y2="426"/>
    <line x1="652" y1="380" x2="652" y2="420"/>
    <line x1="665" y1="368" x2="665" y2="432"/>
    <line x1="678" y1="346" x2="678" y2="454"/>
    <line x1="691" y1="329" x2="691" y2="471"/>
    <line x1="704" y1="325" x2="704" y2="475"/>
    <line x1="717" y1="344" x2="717" y2="456"/>
    <line x1="730" y1="364" x2="730" y2="436"/>
    <line x1="743" y1="378" x2="743" y2="422"/>
    <line x1="756" y1="385" x2="756" y2="415"/>
    <line x1="769" y1="375" x2="769" y2="425"/>
    <line x1="782" y1="358" x2="782" y2="442"/>
    <line x1="795" y1="336" x2="795" y2="464"/>
    <line x1="808" y1="325" x2="808" y2="475"/>
    <line x1="821" y1="341" x2="821" y2="459"/>
    <line x1="834" y1="360" x2="834" y2="440"/>
    <line x1="847" y1="377" x2="847" y2="423"/>
    <line x1="860" y1="386" x2="860" y2="414"/>
    <line x1="873" y1="372" x2="873" y2="428"/>
    <line x1="886" y1="352" x2="886" y2="448"/>
    <line x1="899" y1="334" x2="899" y2="466"/>
    <line x1="912" y1="344" x2="912" y2="456"/>
    <line x1="925" y1="362" x2="925" y2="438"/>
    <line x1="938" y1="378" x2="938" y2="422"/>
    <line x1="951" y1="387" x2="951" y2="413"/>
    <line x1="964" y1="391" x2="964" y2="409"/>
  </g>

  <!-- Unlit episode blips scattered on the arcs -->
  <g fill="#f3ebde" fill-opacity="0.82">
    <circle cx="1066" cy="338" r="6"/>
    <circle cx="1096" cy="474" r="6"/>
    <circle cx="1190" cy="512" r="5.5"/>
    <circle cx="1262" cy="300" r="5.5"/>
    <circle cx="1224" cy="430" r="5"/>
  </g>

  <!-- One episode lit and ringed -->
  <circle cx="1158" cy="318" r="8.5" fill="#fbeede"/>
  <circle cx="1158" cy="318" r="15" fill="none" stroke="#f0b48c" stroke-opacity="0.85" stroke-width="1.5"/>
  <circle cx="1158" cy="318" r="24" fill="none" stroke="#f0b48c" stroke-opacity="0.30" stroke-width="1.5"/>

  <!-- Sparks lifting off the forge core -->
  <g fill="#f9dcc3">
    <circle cx="430" cy="300" r="2.6" opacity="0.85"/>
    <circle cx="492" cy="286" r="2" opacity="0.7"/>
    <circle cx="404" cy="338" r="1.8" opacity="0.6"/>
    <circle cx="520" cy="332" r="2.2" opacity="0.75"/>
  </g>

  <!-- Forge core -->
  <circle cx="470" cy="400" r="68" fill="#cc785c" opacity="0.18"/>
  <circle cx="470" cy="400" r="50" fill="url(#pf-hero-core)"/>
  <ellipse cx="456" cy="384" rx="17" ry="9" fill="#fdeee0" opacity="0.55"/>
</svg>
