<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="pf-icon-title">
  <title id="pf-icon-title">PodForge app icon</title>
  <defs>
    <radialGradient id="pf-icon-bg" cx="42%" cy="40%" r="78%">
      <stop offset="0%" stop-color="#33251f"/>
      <stop offset="64%" stop-color="#221a16"/>
      <stop offset="100%" stop-color="#181210"/>
    </radialGradient>
    <radialGradient id="pf-icon-core" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#fce3c8"/>
      <stop offset="36%" stop-color="#f3b184"/>
      <stop offset="66%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#9c5236"/>
    </radialGradient>
    <linearGradient id="pf-icon-wave" x1="118" y1="0" x2="176" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f9dcc3"/>
      <stop offset="100%" stop-color="#cc785c"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#pf-icon-bg)"/>

  <!-- Broadcast arcs -->
  <g fill="none" stroke="#cc785c">
    <path d="M196.3 92.1 A40 40 0 0 1 196.3 163.9" stroke-opacity="0.5" stroke-width="3"/>
    <path d="M206.6 67.5 A66 66 0 0 1 206.6 188.5" stroke-opacity="0.28" stroke-width="3"/>
  </g>

  <!-- Audio waveform -->
  <g stroke="url(#pf-icon-wave)" stroke-width="6.5" stroke-linecap="round">
    <line x1="120" y1="111" x2="120" y2="145"/>
    <line x1="134" y1="98" x2="134" y2="158"/>
    <line x1="148" y1="116" x2="148" y2="140"/>
    <line x1="162" y1="104" x2="162" y2="152"/>
    <line x1="176" y1="118" x2="176" y2="138"/>
  </g>

  <!-- One episode lit and ringed -->
  <circle cx="214" cy="96" r="6" fill="#fbeede"/>
  <circle cx="214" cy="96" r="11" fill="none" stroke="#f0b48c" stroke-opacity="0.85" stroke-width="2"/>

  <!-- Forge core -->
  <circle cx="92" cy="128" r="44" fill="#cc785c" opacity="0.16"/>
  <circle cx="92" cy="128" r="31" fill="url(#pf-icon-core)"/>
  <ellipse cx="83" cy="118" rx="10" ry="5" fill="#fdeee0" opacity="0.55"/>
</svg>
