<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="pf-og-title pf-og-desc">
  <title id="pf-og-title">PodForge — case study card</title>
  <desc id="pf-og-desc">A wide social card: the wordmark PodForge with the tagline Claude writes the script, a local voice speaks it, a Raspberry Pi ships the feed, and a forge mark on the right where a glowing core renders a waveform that fans into broadcast arcs.</desc>

  <defs>
    <linearGradient id="pf-og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2EDE3"/>
      <stop offset="100%" stop-color="#E8DFCC"/>
    </linearGradient>
    <radialGradient id="pf-og-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#CC785C" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#CC785C" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#CC785C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pf-og-core" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#F7D2B2"/>
      <stop offset="44%" stop-color="#E08A63"/>
      <stop offset="100%" stop-color="#A85C44"/>
    </radialGradient>
    <linearGradient id="pf-og-wave" x1="812" y1="0" x2="944" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D98A63"/>
      <stop offset="100%" stop-color="#B5613F"/>
    </linearGradient>
    <style>
      .serif{font-family:"Tiempos Headline","Iowan Old Style",Georgia,"Times New Roman",serif;}
      .sans{font-family:"Styrene B","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
      .wordmark{font-size:100px;font-weight:500;fill:#2D2A26;letter-spacing:-2px;}
      .tagline{font-size:26px;font-weight:400;fill:#6B5F52;}
      .eyebrow{font-size:13px;font-weight:500;fill:#8B7E6F;letter-spacing:4px;}
      .footer{font-size:16px;font-weight:500;fill:#6B5F52;letter-spacing:1px;}
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#pf-og-bg)"/>
  <circle cx="965" cy="315" r="300" fill="url(#pf-og-glow)"/>

  <!-- Left column: text -->
  <text x="80" y="120" class="sans eyebrow">APPLIED AI · CASE STUDY</text>
  <text x="80" y="236" class="serif wordmark">PodForge</text>
  <line x1="80" y1="266" x2="160" y2="266" stroke="#CC785C" stroke-width="2.5" stroke-linecap="round"/>
  <text x="80" y="332" class="serif tagline" font-style="italic">Claude writes the script.</text>
  <text x="80" y="370" class="serif tagline" font-style="italic">A local voice speaks it.</text>
  <text x="80" y="408" class="serif tagline" font-style="italic">A Raspberry Pi ships the feed.</text>
  <text x="80" y="560" class="sans footer">liamday.co.uk</text>
  <line x1="80" y1="575" x2="220" y2="575" stroke="#8B7E6F" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Right column: forge mark (light variant) -->
  <!-- Broadcast arcs -->
  <g fill="none" stroke="#CC785C">
    <path d="M991.2 265.1 A70 70 0 0 1 991.2 394.9" stroke-opacity="0.55" stroke-width="2.5"/>
    <path d="M1010.0 218.7 A120 120 0 0 1 1010.0 441.3" stroke-opacity="0.34" stroke-width="2.5"/>
    <path d="M1028.7 172.4 A170 170 0 0 1 1028.7 487.6" stroke-opacity="0.20" stroke-width="2.5"/>
  </g>
  <path d="M1043.7 135.3 A210 210 0 0 1 1043.7 524.7" fill="none" stroke="#3D3929" stroke-opacity="0.16" stroke-width="1.5"/>

  <!-- Audio waveform -->
  <g stroke="url(#pf-og-wave)" stroke-width="7" stroke-linecap="round">
    <line x1="812" y1="305" x2="812" y2="355"/>
    <line x1="828" y1="287" x2="828" y2="373"/>
    <line x1="844" y1="266" x2="844" y2="394"/>
    <line x1="860" y1="292" x2="860" y2="368"/>
    <line x1="876" y1="312" x2="876" y2="348"/>
    <line x1="892" y1="284" x2="892" y2="376"/>
    <line x1="908" y1="270" x2="908" y2="390"/>
    <line x1="924" y1="298" x2="924" y2="362"/>
    <line x1="940" y1="313" x2="940" y2="347"/>
  </g>

  <!-- Blips on the arcs -->
  <g fill="#FFFFFF" stroke="#3D3929" stroke-width="1.5">
    <circle cx="1006" cy="288" r="6.5"/>
    <circle cx="1024" cy="392" r="6.5"/>
    <circle cx="1086" cy="240" r="6"/>
    <circle cx="1102" cy="408" r="5.5"/>
  </g>
  <!-- One episode lit and ringed -->
  <circle cx="1052" cy="250" r="7.5" fill="#FFFFFF" stroke="#CC785C" stroke-width="2"/>
  <circle cx="1052" cy="250" r="13" fill="none" stroke="#CC785C" stroke-opacity="0.7" stroke-width="1.5"/>

  <!-- Forge core -->
  <circle cx="760" cy="330" r="48" fill="#CC785C" opacity="0.14"/>
  <circle cx="760" cy="330" r="34" fill="url(#pf-og-core)"/>
  <ellipse cx="750" cy="320" rx="11" ry="5.5" fill="#FBE7D6" opacity="0.6"/>

  <text x="1120" y="600" class="sans" font-size="13" fill="#8B7E6F" letter-spacing="2px" text-anchor="end">Live · 2026</text>
</svg>
