<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-labelledby="cpn-arch-title cpn-arch-desc" class="cpn-arch">
  <title id="cpn-arch-title">Career Pivot Navigator architecture</title>
  <desc id="cpn-arch-desc">Four open UK data sources (ONS ASHE for pay, ONS Annual Population Survey via Nomis for demand, the DfE Skills Imperative 2035 for projections, and ESCO for skills) feed a deterministic connector that translates a military role to civilian occupations, ranks them, grounds every figure with its source, and renders the plan. The responsible spine governs the whole system. In a session, a free-text profile goes to the user's own Claude, guided by the build-transition-plan Skill, which calls the connector tools and synthesises one cited transition plan, then a self-contained artifact that makes no further calls.</desc>

  <defs>
    <style>
      .cpn-arch{
        --d-card-bg: rgb(var(--graphite-600, 38 41 46));
        --d-card-border: rgb(var(--aluminum-500, 90 94 101) / 0.4);
        --d-text: rgb(var(--aluminum-100, 228 231 236));
        --d-mid: rgb(var(--aluminum-300, 157 161 169));
        --d-muted: rgb(var(--aluminum-300, 157 161 169));
        --d-accent: rgb(var(--ember-400, 240 139 74));
        --d-on-accent: rgb(var(--charcoal-950, 7 8 10));
        --d-soft: rgb(var(--aluminum-400, 131 135 143));
        --d-store-bg: rgb(var(--graphite-600, 38 41 46));
        --d-store-border: rgb(var(--ember-400, 240 139 74));
        display:block; width:100%; height:auto;
      }
      .cpn-arch text{ font-family:"Styrene B","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .cpn-arch .lane{ font-size:13px; font-weight:500; fill:var(--d-muted); letter-spacing:1.5px; text-transform:uppercase; }
      .cpn-arch .nl{ font-size:13px; font-weight:500; fill:var(--d-text); }
      .cpn-arch .sl{ font-size:11px; fill:var(--d-mid); }
      .cpn-arch .edge{ font-size:11px; fill:var(--d-muted); }
      .cpn-arch .card{ fill:var(--d-card-bg); stroke:var(--d-card-border); stroke-width:1; }
      .cpn-arch .dot{ fill:var(--d-accent); }
      .cpn-arch .acc{ stroke:var(--d-accent); stroke-width:2; fill:none; }
      .cpn-arch .soft{ stroke:var(--d-soft); stroke-width:1.5; fill:none; stroke-opacity:0.7; }
      .cpn-arch .store{ fill:var(--d-store-bg); stroke:var(--d-store-border); stroke-width:2.5; }
      .cpn-arch .prim{ fill:var(--d-accent); stroke:var(--d-accent); }
      .cpn-arch .prim-nl{ font-size:13px; font-weight:600; fill:var(--d-on-accent); }
      .cpn-arch .prim-sl{ font-size:11px; fill:var(--d-on-accent); opacity:0.88; }
      .cpn-arch .principle{ fill:none; stroke:var(--d-accent); stroke-width:1; stroke-dasharray:4 4; stroke-opacity:0.6; }
    </style>
    <marker id="cpn-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--d-accent)"/></marker>
    <marker id="cpn-arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--d-soft)"/></marker>
  </defs>

  <!-- Lane labels, top row -->
  <text x="155" y="54" class="lane" text-anchor="middle">Open UK data</text>
  <text x="420" y="54" class="lane" text-anchor="middle">Connector · deterministic</text>
  <text x="690" y="54" class="lane" text-anchor="middle">Cited grounding</text>
  <text x="975" y="54" class="lane" text-anchor="middle">Responsible spine</text>

  <!-- Sources -->
  <g>
    <rect x="55" y="92" width="200" height="40" rx="8" class="card"/>
    <circle cx="76" cy="112" r="5" class="dot"/><text x="94" y="116" class="nl">ONS ASHE — pay</text>
    <rect x="55" y="140" width="200" height="40" rx="8" class="card"/>
    <circle cx="76" cy="160" r="5" class="dot"/><text x="94" y="164" class="nl">ONS APS · Nomis — demand</text>
    <rect x="55" y="188" width="200" height="40" rx="8" class="card"/>
    <circle cx="76" cy="208" r="5" class="dot"/><text x="94" y="212" class="nl">DfE 2035 — projection</text>
    <rect x="55" y="236" width="200" height="40" rx="8" class="card"/>
    <circle cx="76" cy="256" r="5" class="dot"/><text x="94" y="260" class="nl">ESCO — skills</text>
  </g>

  <!-- Connector (accent-bordered core) -->
  <rect x="340" y="120" width="172" height="148" rx="14" class="store"/>
  <text x="426" y="152" class="nl" text-anchor="middle">cpn connector</text>
  <text x="426" y="178" class="sl" text-anchor="middle">translate · rank</text>
  <text x="426" y="196" class="sl" text-anchor="middle">ground · render</text>
  <text x="426" y="222" class="sl" text-anchor="middle">OGL files +</text>
  <text x="426" y="240" class="sl" text-anchor="middle">live keyless APIs</text>

  <!-- Cited grounding -->
  <rect x="592" y="146" width="196" height="96" rx="12" class="card"/>
  <text x="690" y="180" class="nl" text-anchor="middle">every figure cited</text>
  <text x="690" y="200" class="sl" text-anchor="middle">source + as-of date</text>
  <text x="690" y="218" class="sl" text-anchor="middle">or an honest "not available"</text>

  <!-- Responsible spine (governing principle) -->
  <rect x="866" y="120" width="216" height="120" rx="12" class="principle"/>
  <text x="974" y="152" class="nl" text-anchor="middle">responsible spine</text>
  <text x="974" y="174" class="sl" text-anchor="middle">grounded, never guessed</text>
  <text x="974" y="192" class="sl" text-anchor="middle">guidance, not determination</text>
  <text x="974" y="210" class="sl" text-anchor="middle">open data only · opt-out</text>
  <text x="974" y="228" class="sl" text-anchor="middle">refuse + signpost</text>

  <!-- Source -> connector arrows -->
  <path d="M255 112 Q300 112 340 150" class="soft" marker-end="url(#cpn-arrow-soft)"/>
  <path d="M255 160 Q300 160 338 176" class="soft" marker-end="url(#cpn-arrow-soft)"/>
  <path d="M255 208 Q300 208 338 210" class="soft" marker-end="url(#cpn-arrow-soft)"/>
  <path d="M255 256 Q300 256 340 240" class="soft" marker-end="url(#cpn-arrow-soft)"/>
  <!-- Connector -> cited grounding -->
  <line x1="512" y1="190" x2="590" y2="192" class="acc" marker-end="url(#cpn-arrow)"/>
  <text x="551" y="180" class="edge" text-anchor="middle">grounds</text>

  <!-- divider -->
  <line x1="40" y1="300" x2="1240" y2="300" stroke="var(--d-card-border)" stroke-width="1"/>

  <!-- Lane labels, bottom row -->
  <text x="150" y="334" class="lane" text-anchor="middle">Free-text profile</text>
  <text x="470" y="334" class="lane" text-anchor="middle">Your Claude + the Skill · reasoning</text>
  <text x="715" y="334" class="lane" text-anchor="middle">Synthesise</text>
  <text x="975" y="334" class="lane" text-anchor="middle">Output</text>

  <!-- Profile -->
  <rect x="55" y="372" width="190" height="84" rx="12" class="card"/>
  <text x="150" y="404" class="nl" text-anchor="middle">free-text profile</text>
  <text x="150" y="424" class="sl" text-anchor="middle">rank · trade · location</text>
  <text x="150" y="442" class="sl" text-anchor="middle">constraints · priorities</text>

  <!-- Claude + Skill -->
  <rect x="320" y="360" width="232" height="108" rx="12" class="card"/>
  <text x="436" y="390" class="nl" text-anchor="middle">build-transition-plan Skill</text>
  <text x="436" y="412" class="sl" text-anchor="middle">clarify · translate · rank</text>
  <text x="436" y="430" class="sl" text-anchor="middle">profile · skills gap · routes</text>
  <text x="436" y="450" class="sl" text-anchor="middle">in the user's own Claude</text>

  <!-- Grounded synthesis (accent) -->
  <rect x="620" y="372" width="178" height="84" rx="12" class="prim"/>
  <text x="709" y="406" class="prim-nl" text-anchor="middle">cited plan</text>
  <text x="709" y="428" class="prim-sl" text-anchor="middle">guidance, not determination</text>

  <!-- Output -->
  <rect x="858" y="368" width="224" height="92" rx="12" class="card"/>
  <text x="970" y="398" class="nl" text-anchor="middle">shortlist + plan</text>
  <text x="970" y="418" class="sl" text-anchor="middle">self-contained artifact</text>
  <text x="970" y="436" class="sl" text-anchor="middle">data baked in, no calls</text>

  <!-- Profile -> Claude -->
  <line x1="245" y1="414" x2="318" y2="414" class="soft" marker-end="url(#cpn-arrow-soft)"/>
  <!-- Claude -> synthesis -->
  <line x1="552" y1="414" x2="618" y2="414" class="acc" marker-end="url(#cpn-arrow)"/>
  <!-- Synthesis -> output -->
  <line x1="798" y1="414" x2="856" y2="414" class="acc" marker-end="url(#cpn-arrow)"/>

  <!-- Vertical bridge: Claude <-> connector -->
  <path d="M436 360 L430 270" class="acc" marker-start="url(#cpn-arrow)" marker-end="url(#cpn-arrow)"/>
  <text x="540" y="312" class="edge" text-anchor="middle">tool calls · cited data back</text>

  <!-- Guardrail annotation under synthesis -->
  <text x="709" y="478" class="edge" text-anchor="middle">refuse + signpost: benefits · medical · mental health</text>
</svg>
