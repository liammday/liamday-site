<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 604" role="img" aria-labelledby="pf-out-title pf-out-desc" class="pf-out">
  <title id="pf-out-title">Example output: a published episode</title>
  <desc id="pf-out-desc">An episode card for "The Big Why" children's feed, episode 12, "Why is the sky blue?", hosted by the fictional pair Pip and Bramble. A player shows a waveform with an intro jingle at the start, sound-effect cues sitting in the gaps between speech, and an outro jingle at the end, with a playhead at four minutes twelve of a total nine minutes forty-eight. Four tiles record that the audio was rendered on-device with the local Kokoro voice; that its length of 9:48 was written to a calibrated target of 9:50 rather than guessed; that jingles and sound effects were mixed in the gaps and the loudness normalised; and that it is delivered through a signed URL after the Raspberry Pi rebuilt the feed. A footer notes the hosts are a fixed, fictional cast and no real person is impersonated.</desc>

  <defs>
    <style>
      .pf-out{
        --d-bg: rgb(var(--charcoal-900, 16 18 21));
        --d-card-bg: rgb(var(--graphite-600, 38 41 46));
        --d-card-border: rgb(var(--aluminum-500, 90 94 101) / 0.4);
        --d-text: rgb(var(--aluminum-100, 228 231 236));
        --d-mid: rgb(var(--aluminum-300, 157 161 169));
        --d-muted: rgb(var(--aluminum-300, 157 161 169));
        --d-accent: rgb(var(--ember-400, 240 139 74));
        --d-accent-soft: rgb(var(--ember-400, 240 139 74) / 0.32);
        --d-on-accent: rgb(var(--charcoal-950, 7 8 10));
        display:block; width:100%; height:auto;
      }
      /* Accent-coloured TEXT (ember-400) is ~2:1 on the light card/page; darken it
         to ember-200 in light mode only (the vivid dark-theme accent is untouched). */
      :root[data-theme="light"] .pf-out :is(.pill-t, .cue-lbl, .tc-now){ fill: rgb(var(--ember-200, 160 68 0)); }
      .pf-out text{ font-family:"Styrene B","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
      .pf-out .mono{ font-family:"JetBrains Mono","SF Mono",Menlo,Consolas,monospace; }
      .pf-out .panel{ fill:var(--d-bg); stroke:var(--d-card-border); stroke-width:1; }
      .pf-out .tile{ fill:var(--d-card-bg); stroke:var(--d-card-border); stroke-width:1; }
      .pf-out .tile-hi{ fill:var(--d-card-bg); stroke:var(--d-accent); stroke-width:2; }
      .pf-out .cover{ fill:var(--d-card-bg); stroke:var(--d-card-border); stroke-width:1; }
      .pf-out .h1{ font-size:24px; font-weight:600; fill:var(--d-text); }
      .pf-out .sub{ font-size:14px; fill:var(--d-mid); }
      .pf-out .ttl{ font-size:30px; font-weight:600; fill:var(--d-text); }
      .pf-out .host{ font-size:15px; fill:var(--d-mid); }
      .pf-out .lane{ font-size:11px; font-weight:600; fill:var(--d-muted); letter-spacing:1.5px; text-transform:uppercase; }
      .pf-out .val{ font-size:16px; font-weight:600; fill:var(--d-text); }
      .pf-out .meta{ font-size:11.5px; fill:var(--d-mid); }
      .pf-out .pill{ fill:none; stroke:var(--d-accent); stroke-width:1.5; }
      .pf-out .pill-t{ font-size:13px; font-weight:600; fill:var(--d-accent); }
      .pf-out .foot{ font-size:12.5px; fill:var(--d-muted); }
      .pf-out .wf-on{ stroke:var(--d-accent); stroke-width:4; stroke-linecap:round; }
      .pf-out .wf-off{ stroke:var(--d-muted); stroke-width:4; stroke-linecap:round; stroke-opacity:0.55; }
      .pf-out .head{ stroke:var(--d-accent); stroke-width:2; }
      .pf-out .cue{ fill:var(--d-accent); stroke:none; }
      .pf-out .cue-stem{ stroke:var(--d-accent); stroke-width:1.5; stroke-opacity:0.7; }
      .pf-out .cue-lbl{ font-size:10.5px; font-weight:600; fill:var(--d-accent); letter-spacing:0.5px; }
      .pf-out .jingle{ fill:none; stroke:var(--d-accent); stroke-width:1.5; stroke-opacity:0.7; }
      .pf-out .jingle-lbl{ font-size:10.5px; font-weight:600; fill:var(--d-mid); letter-spacing:0.5px; }
      .pf-out .tc{ font-size:13px; fill:var(--d-mid); }
      .pf-out .tc-now{ font-size:13px; font-weight:600; fill:var(--d-accent); }
    </style>
  </defs>

  <rect x="16" y="16" width="1168" height="572" rx="20" class="panel"/>

  <!-- Header: feed cover + show -->
  <rect x="48" y="46" width="72" height="72" rx="16" class="cover"/>
  <circle cx="73" cy="82" r="12" fill="var(--d-accent)"/>
  <ellipse cx="69" cy="78" rx="4" ry="2" fill="var(--d-on-accent)" opacity="0.35"/>
  <g stroke="var(--d-accent)" stroke-width="3" stroke-linecap="round">
    <line x1="92" y1="74" x2="92" y2="90"/>
    <line x1="101" y1="69" x2="101" y2="95"/>
  </g>
  <path d="M108 72 A14 14 0 0 1 108 92" fill="none" stroke="var(--d-accent)" stroke-width="2.5" stroke-opacity="0.5"/>

  <text x="140" y="74" class="h1">The Big Why</text>
  <text x="140" y="100" class="sub">children's feed · episode 12</text>

  <rect x="930" y="58" width="206" height="36" rx="18" class="pill"/>
  <text x="1033" y="81" class="pill-t" text-anchor="middle">rendered on-device</text>

  <line x1="48" y1="138" x2="1136" y2="138" stroke="var(--d-card-border)"/>

  <!-- Episode title -->
  <text x="48" y="194" class="ttl">Why is the sky blue?</text>
  <text x="48" y="224" class="host">with Pip &amp; Bramble — a fixed, fictional cast</text>

  <!-- Jingle brackets -->
  <path d="M132 284 L132 268 L186 268 L186 284" class="jingle"/>
  <text x="159" y="258" class="jingle-lbl" text-anchor="middle">intro jingle</text>
  <path d="M1074 284 L1074 268 L1128 268 L1128 284" class="jingle"/>
  <text x="1101" y="258" class="jingle-lbl" text-anchor="middle">outro jingle</text>

  <!-- SFX cues in the gaps -->
    <circle cx="402" cy="314" r="3.5" class="cue"/>
    <line x1="402" y1="266" x2="402" y2="284" class="cue-stem"/>
    <text x="402" y="258" class="cue-lbl" text-anchor="middle">sfx</text>
    <circle cx="666" cy="314" r="3.5" class="cue"/>
    <line x1="666" y1="266" x2="666" y2="284" class="cue-stem"/>
    <text x="666" y="258" class="cue-lbl" text-anchor="middle">sfx</text>
    <circle cx="954" cy="314" r="3.5" class="cue"/>
    <line x1="954" y1="266" x2="954" y2="284" class="cue-stem"/>
    <text x="954" y="258" class="cue-lbl" text-anchor="middle">sfx</text>

  <!-- Waveform -->
  <g>
    <line x1="132" y1="294.1" x2="132" y2="333.9" class="wf-on"/>
    <line x1="152" y1="289.0" x2="152" y2="339.0" class="wf-on"/>
    <line x1="172" y1="299.0" x2="172" y2="329.0" class="wf-on"/>
    <line x1="192" y1="292.9" x2="192" y2="335.1" class="wf-on"/>
    <line x1="212" y1="297.6" x2="212" y2="330.4" class="wf-on"/>
    <line x1="232" y1="278.1" x2="232" y2="349.9" class="wf-on"/>
    <line x1="252" y1="302.7" x2="252" y2="325.3" class="wf-on"/>
    <line x1="272" y1="296.1" x2="272" y2="331.9" class="wf-on"/>
    <line x1="292" y1="282.4" x2="292" y2="345.6" class="wf-on"/>
    <line x1="312" y1="286.8" x2="312" y2="341.2" class="wf-on"/>
    <line x1="332" y1="305.0" x2="332" y2="323.0" class="wf-on"/>
    <line x1="352" y1="290.6" x2="352" y2="337.4" class="wf-on"/>
    <line x1="372" y1="299.6" x2="372" y2="328.4" class="wf-on"/>
    <line x1="432" y1="278.8" x2="432" y2="349.2" class="wf-on"/>
    <line x1="452" y1="288.8" x2="452" y2="339.2" class="wf-on"/>
    <line x1="472" y1="296.0" x2="472" y2="332.0" class="wf-off"/>
    <line x1="492" y1="299.3" x2="492" y2="328.7" class="wf-off"/>
    <line x1="512" y1="294.4" x2="512" y2="333.6" class="wf-off"/>
    <line x1="532" y1="300.5" x2="532" y2="327.5" class="wf-off"/>
    <line x1="552" y1="293.7" x2="552" y2="334.3" class="wf-off"/>
    <line x1="572" y1="276.7" x2="572" y2="351.3" class="wf-off"/>
    <line x1="592" y1="282.6" x2="592" y2="345.4" class="wf-off"/>
    <line x1="612" y1="303.0" x2="612" y2="325.0" class="wf-off"/>
    <line x1="632" y1="304.5" x2="632" y2="323.5" class="wf-off"/>
    <line x1="692" y1="287.3" x2="692" y2="340.7" class="wf-off"/>
    <line x1="712" y1="281.2" x2="712" y2="346.8" class="wf-off"/>
    <line x1="732" y1="288.2" x2="732" y2="339.8" class="wf-off"/>
    <line x1="752" y1="302.3" x2="752" y2="325.7" class="wf-off"/>
    <line x1="772" y1="283.6" x2="772" y2="344.4" class="wf-off"/>
    <line x1="792" y1="299.5" x2="792" y2="328.5" class="wf-off"/>
    <line x1="812" y1="292.4" x2="812" y2="335.6" class="wf-off"/>
    <line x1="832" y1="299.1" x2="832" y2="328.9" class="wf-off"/>
    <line x1="852" y1="284.2" x2="852" y2="343.8" class="wf-off"/>
    <line x1="872" y1="288.3" x2="872" y2="339.7" class="wf-off"/>
    <line x1="892" y1="297.4" x2="892" y2="330.6" class="wf-off"/>
    <line x1="912" y1="290.9" x2="912" y2="337.1" class="wf-off"/>
    <line x1="932" y1="278.1" x2="932" y2="349.9" class="wf-off"/>
    <line x1="992" y1="295.7" x2="992" y2="332.3" class="wf-off"/>
    <line x1="1012" y1="296.7" x2="1012" y2="331.3" class="wf-off"/>
    <line x1="1032" y1="303.5" x2="1032" y2="324.5" class="wf-off"/>
    <line x1="1052" y1="274.8" x2="1052" y2="353.2" class="wf-off"/>
    <line x1="1072" y1="288.0" x2="1072" y2="340.0" class="wf-off"/>
    <line x1="1092" y1="288.8" x2="1092" y2="339.2" class="wf-off"/>
    <line x1="1112" y1="301.4" x2="1112" y2="326.6" class="wf-off"/>
  </g>

  <!-- Playhead + timecodes -->
  <line x1="472" y1="262" x2="472" y2="366" class="head"/>
  <circle cx="472" cy="262" r="4" fill="var(--d-accent)"/>
  <text x="132" y="392" class="tc-now">04:12</text>
  <text x="1128" y="392" class="tc" text-anchor="end">09:48</text>

  <!-- Detail tiles -->
  <g>
    <rect x="48"  y="416" width="263" height="92" rx="12" class="tile"/>
    <text x="66"  y="444" class="lane">Rendered</text>
    <text x="66"  y="472" class="val">On-device</text>
    <text x="66"  y="494" class="meta">Kokoro local voice · GPU</text>

    <rect x="323" y="416" width="263" height="92" rx="12" class="tile-hi"/>
    <text x="341" y="444" class="lane" fill="var(--d-accent)">Length</text>
    <text x="341" y="472" class="val">9:48 · target 9:50</text>
    <text x="341" y="494" class="meta">calibrated, not guessed</text>

    <rect x="598" y="416" width="263" height="92" rx="12" class="tile"/>
    <text x="616" y="444" class="lane">Mix</text>
    <text x="616" y="472" class="val">Jingle + SFX</text>
    <text x="616" y="494" class="meta">in the gaps · loudness normalised</text>

    <rect x="873" y="416" width="263" height="92" rx="12" class="tile"/>
    <text x="891" y="444" class="lane">Delivery</text>
    <text x="891" y="472" class="val">Signed URL</text>
    <text x="891" y="494" class="meta">Pi rebuilt feed.xml · any app</text>
  </g>

  <!-- Footer -->
  <text x="48" y="552" class="foot">Written to the children's feed brief — a fixed, fictional cast, gentler pacing, British English, and no real person impersonated.</text>
</svg>
